name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/vchat_ci
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      DEEPSEEK_API_KEY: ci-placeholder
      QWEN_API_KEY: ci-placeholder
      DASHSCOPE_API_KEY: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check
